name: luma_app
description: Luma - A private memory documentation and sharing app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  supabase_flutter: ^2.3.0
  firebase_messaging: ^14.7.9

  # ── State Management ──────────────────────────────────────
  provider: ^6.1.2

  # ── Media & Camera ────────────────────────────────────────
  image_picker: ^1.0.7

  # ── Location ──────────────────────────────────────────────
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # ── Contacts ──────────────────────────────────────────────
  flutter_contacts: ^1.1.7+1

  # ── Local Notifications ───────────────────────────────────
  flutter_local_notifications: ^17.0.0

  # ── Offline Storage ───────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Sharing ───────────────────────────────────────────────
  share_plus: ^9.0.0              # system share sheet — v9 is compatible with firebase_auth ^4.x
  url_launcher: ^6.2.5            # sms: URI for directed SMS sharing
  app_links: ^6.0.0               # incoming deep link (luma://s/{id}) handling

  # ── UI Helpers ────────────────────────────────────────────
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  flutter_native_splash: ^2.3.10
  google_maps_flutter: ^2.6.0
  cupertino_icons: ^1.0.6
  uuid: ^4.3.3
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
